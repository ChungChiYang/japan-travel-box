<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🇯🇵 日本自由行 - 全功能旅遊工具箱</title>
    <style>
        :root {
            --primary-color: #e63946;
            --bg-color: #f8f9fa;
            --text-color: #2b2d42;
            --sidebar-width: 260px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ==================== 🗺️ 左側導覽列 (Sidebar) ==================== */
        .sidebar {
            width: var(--sidebar-width);
            background-color: #1d3557;
            color: white;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .sidebar-header {
            padding: 1.5rem 1rem;
            background: linear-gradient(135deg, var(--primary-color), #ff7096);
            text-align: center;
        }
        .sidebar-header h2 { margin: 0; font-size: 1.3rem; letter-spacing: 1px; }
        .sidebar-header p { margin: 0.3rem 0 0 0; font-size: 0.75rem; opacity: 0.8; }

        .menu-list {
            list-style: none;
            padding: 1rem 0;
            margin: 0;
            flex-grow: 1;
            overflow-y: auto;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 1rem 1.5rem;
            color: #f1f3f5;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            border-left: 4px solid transparent;
        }
        .menu-item:hover {
            background-color: #457b9d;
            color: white;
        }
        .menu-item.active {
            background-color: #1d3557;
            background: rgba(255, 255, 255, 0.1);
            border-left-color: var(--primary-color);
            color: white;
        }

        .menu-divider {
            padding: 0.5rem 1.5rem;
            font-size: 0.75rem;
            color: #a8dadc;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 1rem;
        }

        .menu-item.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .menu-item.disabled:hover { background: transparent; }

        .sidebar-footer {
            padding: 1rem;
            font-size: 0.75rem;
            text-align: center;
            color: #a8dadc;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        /* ==================== 💻 右側主內容區 (Iframe 載入器) ==================== */
        .main-container {
            flex-grow: 1;
            height: 100vh;
            border: none;
            background-color: var(--bg-color);
        }

        /* 讓 iframe 漂亮鋪滿右側 */
        #tool-runner {
            width: 100%;
            height: 100%;
            border: none;
            background-color: transparent;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>🧳 智慧旅遊盒子</h2>
            <p>Version 2.5 (模組化分開版)</p>
        </div>
        <ul class="menu-list">
            <div class="menu-divider">目前工具</div>
            <li class="menu-item active" onclick="loadTool('旅遊筆記網V4.html', this)">
                <span>🇯🇵</span> 自由行情報資料庫
            </li>
            <li class="menu-item" onclick="loadTool('旅遊規劃V8.html', this)">
                <span>📖</span> 隨身路書與點檢表
            </li>

            <div class="menu-divider">未來擴充預留</div>
            <li class="menu-item disabled">
                <span>💰</span> 旅遊記帳與分帳
            </li>
            <li class="menu-item disabled">
                <span>💹</span> 即時日幣匯率助手
            </li>
        </ul>
        <div class="sidebar-footer">
            各工具獨立儲存於瀏覽器<br>換設備請記得於各工具內導出
        </div>
    </div>

    <div class="main-container">
        <iframe id="tool-runner" src="database.html"></iframe>
    </div>

    <script>
        function loadTool(fileName, menuItem) {
            // 1. 改變 iframe 的來源檔案網址
            document.getElementById('tool-runner').src = fileName;

            // 2. 切換左側按鈕高亮狀態
            document.querySelectorAll('.menu-item').forEach(item => {
                item.classList.remove('active');
            });
            menuItem.classList.add('active');
        }
    </script>
</body>
</html>
